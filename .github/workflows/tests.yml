name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run offline test suite
        run: |
          set -e
          for f in tests/test_*.py; do
            echo "=== $f ==="
            python "$f"
          done
